<div class="container-fluid mt-4">
  <h2>Orders Management</h2>
  <button mat-raised-button color="primary" (click)="createNewOrder()">
    Create New Order
  </button>

  


  <!-- Table with Sorting -->
  <div class="table-responsive">
    <table
      mat-table
      [dataSource]="filteredDataSource"
      class="table table-bordered"
      matSort
      style="width: 100%"
    >
      <!-- Id Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let order">{{ order.id }}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let order">{{ order.name }}</td>
      </ng-container>

      <!-- City Column -->
      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>City</th>
        <td mat-cell *matCellDef="let order">{{ order.city }}</td>
      </ng-container>

      <!-- Phone Column -->
      <ng-container matColumnDef="phoneNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Phone Number</th>
        <td mat-cell *matCellDef="let order">{{ order.phoneNumber }}</td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Order Status</th>
        <td mat-cell *matCellDef="let order">
          <span [class]="getStatusClass(order.status)">
            {{ order.status }}
          </span>
        </td>
      </ng-container>

      <!-- Total Price Column -->
      <ng-container matColumnDef="totalPrice">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Total Price</th>
        <td mat-cell *matCellDef="let order">
          {{ order.totalPrice | number : "1.2-2" }}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let order">
          <button
            mat-raised-button
            color="warn"
            (click)="viewOrder(order.id)"
            class="btn btn-warning btn-sm"
          >
            Details
          </button>
        </td>
      </ng-container>

      <!-- No data row -->
      <tr class="mat-row" *matNoDataRow>
        <td
          class="mat-cell text-center"
          [attr.colspan]="displayedColumns.length"
        >
          No orders found.
        </td>
      </tr>

      <!-- Header Row -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- Data Row -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    
  </div>
</div>
