<body>
  <br />
  <br />
  <br />
  <br />
  <div class="container tm-mt-big tm-mb-big">
    <div class="row">
      <div class="col-12 mx-auto tm-login-col">
        <div class="tm-bg-primary-dark tm-block tm-block-h-auto">
          <div class="row">
            <div class="col-12 text-center">
              <h2 class="tm-block-title mb-4">Create New Account</h2>
            </div>
          </div>

          <div class="row mt-2">
            <div class="col-12">
              <form
                [formGroup]="registerForm"
                (ngSubmit)="onSubmit()"
                class="tm-login-form"
                novalidate
              >
                <!-- Name -->
                <div class="form-group">
                  <label for="name">Full Name</label>
                  <input
                    id="name"
                    type="text"
                    class="form-control validate"
                    formControlName="name"
                    [ngClass]="{ 'is-invalid': submitted && f['name'].errors }"
                  />
                  <div
                    *ngIf="submitted && f['name']?.errors"
                    class="invalid-feedback"
                  >
                    <div *ngIf="f['name']?.errors?.['required']">
                      Full name is required
                    </div>
                  </div>
                </div>

                <!-- Username -->
                <div class="form-group mt-3">
                  <label for="username">Username</label>
                  <input
                    id="username"
                    type="text"
                    class="form-control validate"
                    formControlName="username"
                    [ngClass]="{
                      'is-invalid': submitted && f['username'].errors
                    }"
                  />
                  <div
                    *ngIf="submitted && f['username']?.errors"
                    class="invalid-feedback"
                  >
                    <div *ngIf="f['username']?.errors?.['required']">
                      Username is required
                    </div>
                  </div>
                </div>

                <!-- Email -->
                <div class="form-group mt-3">
                  <label for="email">Email</label>
                  <input
                    id="email"
                    type="email"
                    class="form-control validate"
                    formControlName="email"
                    [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
                  />
                  <div
                    *ngIf="submitted && f['email']?.errors"
                    class="invalid-feedback"
                  >
                    <div *ngIf="f['email']?.errors?.['required']">
                      Email is required
                    </div>
                    <div *ngIf="f['email']?.errors?.['email']">
                      Please enter a valid email
                    </div>
                  </div>
                </div>

                <!-- Phone -->
                <div class="form-group mt-3">
                  <label for="phone">Phone</label>
                  <input
                    id="phone"
                    type="tel"
                    class="form-control validate"
                    formControlName="phone"
                    [ngClass]="{ 'is-invalid': submitted && f['phone'].errors }"
                  />
                  <div
                    *ngIf="submitted && f['phone']?.errors"
                    class="invalid-feedback"
                  >
                    <div *ngIf="f['phone']?.errors?.['required']">
                      Phone is required
                    </div>
                  </div>
                </div>

                <!-- City -->
                <div class="form-group mt-3">
                  <label for="city">City</label>
                  <input
                    id="city"
                    type="text"
                    class="form-control validate"
                    formControlName="city"
                    [ngClass]="{ 'is-invalid': submitted && f['city'].errors }"
                  />
                  <div
                    *ngIf="submitted && f['city']?.errors"
                    class="invalid-feedback"
                  >
                    <div *ngIf="f['city']?.errors?.['required']">
                      City is required
                    </div>
                  </div>
                </div>

                <!-- Password -->
                <div class="form-group mt-3">
                  <label for="password">Password</label>
                  <input
                    id="password"
                    type="password"
                    class="form-control validate"
                    formControlName="password"
                    [ngClass]="{
                      'is-invalid': submitted && f['password'].errors
                    }"
                  />
                  <div
                    *ngIf="submitted && f['password']?.errors"
                    class="invalid-feedback"
                  >
                    <div *ngIf="f['password']?.errors?.['required']">
                      Password is required
                    </div>
                    <div *ngIf="f['password']?.errors?.['minlength']">
                      Password must be at least 6 characters
                    </div>
                  </div>
                </div>

                <!-- Role (Radio Buttons) -->
                <div class="form-group mt-3" *ngIf="userAdmin">
                  <label class="d-block">Role</label>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      formControlName="role"
                      id="roleCustomer"
                      value="Customer"
                    />
                    <label class="form-check-label" for="roleCustomer"
                      >Customer</label
                    >
                  </div>
                  <div class="form-check form-check-inline">
                    <input
                      class="form-check-input"
                      type="radio"
                      formControlName="role"
                      id="roleAdmin"
                      value="Admin"
                    />
                    <label class="form-check-label" for="roleAdmin"
                      >Admin</label
                    >
                  </div>
                  <div
                    *ngIf="submitted && f['role']?.errors"
                    class="invalid-feedback d-block"
                  >
                    Please select a role
                  </div>
                </div>

                <!-- Register Button -->
                <div class="form-group mt-4">
                  <button
                    type="submit"
                    class="btn btn-primary btn-block text-uppercase"
                  >
                    Register
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
