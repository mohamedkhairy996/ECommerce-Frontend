<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Responsive Bootstrap4 Shop Template, Created by Imran Hossain from https://imransdesign.com/">

	<!-- favicon -->
	<link rel="shortcut icon" type="image/png" href="/assets/img/favicon.png">
	<!-- google font -->
	<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
	<!-- fontawesome -->
	<link rel="stylesheet" href="/assets/css/all.min.css">
	<!-- bootstrap -->
	<link rel="stylesheet" href="/assets/bootstrap/css/bootstrap.min.css">
	<!-- owl carousel -->
	<link rel="stylesheet" href="/assets/css/owl.carousel.css">
	<!-- magnific popup -->
	<link rel="stylesheet" href="/assets/css/magnific-popup.css">
	<!-- animate css -->
	<link rel="stylesheet" href="/assets/css/animate.css">
	<!-- mean menu css -->
	<link rel="stylesheet" href="/assets/css/meanmenu.min.css">
	<!-- main style -->
	<link rel="stylesheet" href="/assets/css/main.css">
	<!-- responsive -->
	<link rel="stylesheet" href="/assets/css/responsive.css">

</head>
<!-- header -->
<div class="top-header-area" id="sticker">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 col-sm-12 text-center">
                <div class="main-menu-wrap">
                    <!-- logo -->
                    <div class="site-logo">
                        <a routerLink="/home">
                            <img src="assets/img/logo.png" alt="Logo">
                        </a>
                    </div>
                    <!-- menu start -->
                    <nav class="main-menu">
                        <ul>
                            <li class="current-list-item">
                                <a href="/home">Home</a>
                            </li>

                            <!-- Admin Links -->
                            <ng-container *ngIf="userAdmin">
                                <li><a routerLink="/admin/dashboard">Dashboard</a></li>
                                <li><a routerLink="/admin/products">Products</a></li>
                                <li><a routerLink="/admin/addProduct">Add Product</a></li>
                                <li><a routerLink="/admin/orders">Orders</a></li>
                            </ng-container>

							<li><a routerLink="/about">About</a></li>
							<li><a routerLink="/cart" *ngIf="user && user.username">Cart</a></li>

                            
                            
								<!-- User / Authentication aligned right -->
							<li class="user-auth" style="margin-left:auto; display:flex; align-items:center; gap:10px;">
							<!-- Shopping Cart -->
							<a class="shopping-cart" routerLink="/cart" *ngIf="user && user.username">
								<i class="fas fa-shopping-cart"></i>
							</a>

							<!-- User Info / Login / Logout -->
							<ng-container *ngIf="user; else loginLink">
								<a href="#">Welcome, {{ user.username }}</a>
								<a href="#" (click)="logout()">Logout</a>
							</ng-container>
							<ng-template #loginLink>
								<a routerLink="/login">Login</a>
							</ng-template>
						</li>


                        </ul>
                    </nav>
                    <div class="mobile-menu"></div>
                    <!-- menu end -->
                </div>
            </div>
        </div>
    </div>
</div>
<!-- end header -->

	<!-- end header -->
