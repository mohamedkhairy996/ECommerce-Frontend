<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<body>
<div class="container mt-5">
  <div class="row tm-content-row">
    <div class="col-sm-12 col-md-12 col-lg-8 col-xl-8 tm-block-col">
      <div class="tm-bg-primary-dark tm-block tm-block-products">
        <div class="tm-product-table-container">
          <table class="table table-hover tm-table-small tm-product-table">
            <thead>
              <tr>
                <th scope="col">PRODUCT NAME</th>
                <th scope="col">PRODUCT PRICE</th>
                <th scope="col">EDIT</th>
                <th scope="col">DELETE</th>
                <th scope="col">&nbsp;</th>
              </tr>
            </thead>
            <tbody>
                <tr *ngFor="let product of products">
                  
                  <td class="tm-product-name">{{ product.name }}</td>
                  <td>{{ product.price }}</td>
                  <td>
                  <a class="tm-product-edit-link" href='/admin/editproduct/{{product.id}}'>
                    <i class="bi bi-pencil-square text-white " style="font-size: 20px;"></i>
                  </a>
                  </td>
                  <td>
                    <a class="tm-product-delete-link" (click)="deleteProduct(product.id)">
                      <i class="far fa-trash-alt tm-product-delete-icon"></i>
                    </a>
                  </td>
                </tr>
            </tbody>
          </table>
        </div>
        <!-- table container -->
        <a
          routerLink="/admin/addProduct"
          class="btn btn-primary btn-block text-uppercase mb-3"
          >Add new product</a
        >
      </div>
    </div>
    <div class="col-sm-12 col-md-12 col-lg-4 col-xl-4 tm-block-col">
      <div class="tm-bg-primary-dark tm-block tm-block-product-categories">
        <h2 class="tm-block-title">Stocks</h2>
        <div class="tm-product-table-container">
          <table class="table tm-table-small tm-product-table">
            <tbody>
              <tr *ngFor="let stock of stocks">
                <td class="tm-product-name">{{ stock.name }}</td>
                <td class="text-center">
                  <a href="javascript:void(0)" (click)="deleteStock(stock.id)" class="tm-product-delete-link">
                    <i class="far fa-trash-alt tm-product-delete-icon"></i>
                  </a>
                </td>
              </tr>
            </tbody>

          </table>
        </div>
        <!-- table container -->
        <a class="btn btn-primary btn-block text-uppercase mb-3" routerLink="/admin/addstock">
          Add new Stock
        </a>
      </div>
    </div>
  </div>
</div>


</body>
